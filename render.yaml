services:
  - type: web
    name: groweasy-csv-importer-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: AI_PROVIDER
        value: mock
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        value: ""
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_API_KEY
        value: ""
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: BATCH_SIZE
        value: "15"
      - key: BATCH_CONCURRENCY
        value: "3"
      - key: BATCH_MAX_RETRIES
        value: "3"
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: groweasy-csv-importer
    runtime: static
    rootDir: frontend
    buildCommand: npm install && STATIC_EXPORT=true npm run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
